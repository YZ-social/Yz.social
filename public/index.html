<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CivilDefense.io</title>
    <link rel="shortcut icon" href="favicon.ico" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="stylesheets/style.css" />
    <script type="importmap">
      {
	"imports": {
	  "uuid": "./uuid/index.js",
	  "s2js": "https://esm.sh/s2js",
          "@material/web/": "https://esm.run/@material/web/",
	  "@yz-social/kdht": "./kdht/index.js",
	  "@yz-social/webrtc": "./webrtc/index.js"
	}
      }
    </script>
    <script type="module">
      import '@material/web/all.js';
      import {styles as typescaleStyles} from '@material/web/typography/md-typescale-styles.js';
      document.adoptedStyleSheets.push(typescaleStyles.styleSheet);
    </script>
    <script type="module">
      import { minidenticonSvg } from "https://cdn.jsdelivr.net/npm/minidenticons@4.2.1/minidenticons.min.js";
    </script>
    <script src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
    <script src="dom-to-image/dom-to-image.min.js"></script>
    <script type="module" src="javascripts/main.js"></script>
  </head>
  <body>
    <div id="mapCapture">
      <div id="map"></div>
      <img src="images/civil-defense-240.png" alt="civildefense" class="about-image">
    </div>

    <div id="info" class="info-banner loading"></div>

    <div class="button-container">
      <button id="qrButton">
        <img src="images/qr.svg" alt="qr code" class="button-image">
      </button>
      <button id="share">
	<img src="images/share.svg" alt="share" class="button-image">
      </button>
      <button id="recenterButton">
        <img src="images/recenter.svg" alt="recenter on position" class="button-image">
      </button>
    </div>

    <div id="qrDisplayContainer" class="hidden">
      <div id="qrDisplay"></div>
    </div>

    <div id="aboutContent" class="hidden">
      <div class="about-display">
	<h1>Civil Defense.io</h1>
	  <ul>
	    <li id="aboutReport"></li>
	    <li id="aboutShared"></li>
	    <li id="aboutFade"></li>
	  </ul>
	<p>
	  <span id="aboutAnyone1"></span>
	  <a id="aboutAnyone2" href="https://github.com/YZ-social/Yz.social" target="yz.sidebar"></a>
	  <span id="aboutAnyone3"></span>
	</p>
	<p>
	  <a id="learnMore" href="https://yz.social/civildefense.html" target="yz.sidebar">Learn More</a>
	</p>
	<p><small><span id="version"></span> 0.0.36</small></p>
      </div>
    </div>

    <md-chip-set class="watching-hashtags">
    </md-chip-set>

    <md-menu positioning="popover" id="popoverMenu"></md-menu>
  </body>
</html>
